<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Árbol de Transferencias de Derechos</title>
<script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>

<style>
  /* ——— Disposición general ——— */
  body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;               /* panel | resizer | grafo */
    height:100vh;
    overflow:hidden;
  }

  /* ——— Panel izquierdo ——— */
  #left-panel{
    width:320px;                /* ancho inicial */
    min-width:200px;
    max-width:600px;
    flex:0 0 auto;              /* ancho controlado por JS */
    display:flex;
    flex-direction:column;
    background:#f0f0f0;
    overflow:hidden;
  }

  #search-container{
  padding:20px;
  background:#f0f0f0;
  }

  #search-input{
    padding:8px;
    width:100%;
    box-sizing:border-box;
    margin-bottom:10px;
  }

  #search-button{
    padding:8px 16px;
    width:100%;
  }

  #info-container{
    flex-grow:1;
    overflow-y:auto;
    background:#fff;
    padding:10px;
    font-size:14px;
    border-top:1px solid #ccc;
  }

  /* ——— Barra divisoria ——— */
  #resizer{
    width:5px;
    background:#aaa;
    cursor:ew-resize;
    flex-shrink:0;
    user-select:none;
  }

  /* ——— Grafo ——— */
  #cy{
    flex:1 1 auto;
    height:100vh;
  }
</style>
</head>

<body>

<!-- Panel de búsqueda + info -->
<div id="left-panel">
  <div id="search-container">
    <input id="search-input" type="text" placeholder="Buscar inscripción (ej: 2021-235)">
    <button id="search-button">Buscar</button>
  </div>
  <div id="info-container">Seleccione un nodo para ver la información</div>
</div>

<!-- Divisor -->
<div id="resizer"></div>

<!-- Grafo -->
<div id="cy"></div>

<script>
/* ===== 1.  Barra redimensionable ===== */
const resizer   = document.getElementById('resizer');
const leftPanel = document.getElementById('left-panel');

let isResizing = false;
let startX     = 0;
let startWidth = 0;

resizer.addEventListener('mousedown', e => {
  isResizing  = true;
  startX      = e.clientX;
  startWidth  = parseInt(getComputedStyle(leftPanel).width,10);
  document.body.style.cursor     = 'ew-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const delta    = e.clientX - startX;
  const newWidth = startWidth + delta;
  if (newWidth >= 200 && newWidth <= 600){
    leftPanel.style.width = newWidth + 'px';
    if (cy) cy.resize();                 // ← actualización inmediata
  }
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  document.body.style.cursor     = 'default';
  document.body.style.userSelect = 'auto';
  if (cy) cy.resize();                   // ← ajuste final
});

/* ===== 2.  Carga de datos y creación de Cytoscape ===== */
let originalElements = [];
let cy;                       // la instancia global
let nodeMap = new Map();
let edges   = [];
let lastSelectedNode = null;
let titularesData    = [];

fetch('Datos_Inscripciones.json')
  .then(r => r.json())
  .then(d => { titularesData = d; });

fetch('grafo_inscripciones.json')
  .then(r => r.json())
  .then(data => {
    originalElements = data;
    originalElements.forEach(el => {
      if (el.data?.id){
        nodeMap.set(el.data.id, el);
      }else if (el.data?.source && el.data?.target){
        edges.push(el);
      }
    });

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements : [],
      layout   : { name:'breadthfirst', directed:true, spacingFactor:1.8, orientation:'horizontal' },
      style    : [
        { selector:'node', style:{
            'shape':'round-rectangle',
            'background-opacity':0,
            'border-width':2,
            'border-color':'#888',
            'label':'data(label)',
            'text-valign':'center',
            'text-halign':'center',
            'color':'#000',
            'font-size':'12px',
            'text-wrap':'wrap',
            'text-max-width':'100px',
            'width':'label',
            'height':'label',
            'padding':'8px'
        }},
        { selector:'edge', style:{
            'width':2,
           'line-color':'#888',
           'target-arrow-color':'#888',
           'target-arrow-shape':'triangle',
           'curve-style':'bezier',
           'label': 'data(label)',
           'text-rotation': 'autorotate',
           'font-size': '10px',
           'text-margin-y': '-10px',
           'color': '#555',
           'text-background-color': '#ffffff',
           'text-background-opacity': 1,
           'text-background-padding': '2px'
        }},
        { selector:'.highlighted', style:{
            'border-color':'#FF4136','border-width':4,'color':'#FF4136'
        }},
        { selector:'.selected', style:{
            'border-color':'green','border-width':4,'line-color':'green',
            'target-arrow-color':'green','color':'green'
        }},
        { selector:'.clicked', style:{
            'border-color':'yellow','background-color':'yellow',
            'background-opacity':0.3,
            'transition-property':'background-color','transition-duration':'0.8s'
        }}
      ]
    });
    window.cy = cy;           // por si prefieres usar window.cy

    cy.on('tap', evt => {
      if (evt.target === cy){
        cy.elements().removeClass('selected');
        if (lastSelectedNode){
          lastSelectedNode.removeClass('clicked');
          lastSelectedNode = null;
        }
        document.getElementById('info-container').innerText =
          'Seleccione un nodo para ver la información';
      }else if (evt.target.isNode()){
        cy.elements().removeClass('selected');
        if (lastSelectedNode) lastSelectedNode.removeClass('clicked');
        lastSelectedNode = evt.target;
        lastSelectedNode.addClass('clicked');
        highlightBranch(evt.target);
        updateTitularInfo(evt.target.id());
      }
    });
  });

/* ===== 3.  Búsqueda ===== */
const deepClone = obj =>
  (typeof structuredClone==='function')
    ? structuredClone(obj)
    : JSON.parse(JSON.stringify(obj));

document.getElementById('search-button').addEventListener('click', runSearch);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});

function runSearch(){
  const root = document.getElementById('search-input').value.trim();
  if (!root){ alert('Ingresa una inscripción (Año-Número).'); return; }
  if (!nodeMap.has(root)){
    alert('Inscripción no encontrada. Verifica el formato Año-Número.'); return;
  }

  const yearOf = id => parseInt(id.split('-')[0],10);
  const nodes  = new Set([root]);
  const edgs   = new Set();

  const collectAnc = id => {
    edges.forEach(e =>{
      const {source:s,target:t}=e.data;
      if (t===id || (s===id && yearOf(t)<yearOf(s))){
        if (!nodes.has(s)){ nodes.add(s); collectAnc(s);}
        edgs.add(e);
      }
    });
  };
  const collectDes = id => {
    edges.forEach(e =>{
      const {source:s,target:t}=e.data;
      if (s===id || (t===id && yearOf(s)>yearOf(t))){
        if (!nodes.has(t)){ nodes.add(t); collectDes(t);}
        edgs.add(e);
      }
    });
  };

  collectAnc(root); collectDes(root);

  const subgraph = [...nodes].map(id => deepClone(nodeMap.get(id)))
  .concat([...edgs].map(e => {
    const clonedEdge = deepClone(e);
    const targetId = clonedEdge.data.target;
    const entry = titularesData.find(d => d.ID === targetId);
    if (entry && entry.tipo_transaccion){
      clonedEdge.data.label = entry.tipo_transaccion;
    }
    return clonedEdge;
  }));

  cy.elements().remove();
  cy.add(subgraph);
  cy.layout({
    name:'breadthfirst', directed:true, spacingFactor:1.8,
    orientation:'horizontal', nodeDimensionsIncludeLabels:true
  }).run();

  cy.elements().removeClass('highlighted');
  cy.getElementById(root).addClass('highlighted');
  cy.fit(cy.elements(),50);
}

/* ===== 4.  Helpers ===== */
function highlightBranch(node){
  node.addClass('selected');
  const anc = n=>{
    n.incomers('edge').forEach(e=>{
      e.addClass('selected');
      const s=e.source(); s.addClass('selected'); anc(s);
    });
  };
  const des = n=>{
    n.outgoers('edge').forEach(e=>{
      e.addClass('selected');
      const t=e.target(); t.addClass('selected'); des(t);
    });
  };
  anc(node); des(node);
}

function updateTitularInfo(nodeId){
  const entry = titularesData.find(e => e.ID === nodeId);
  if (entry){
    const infoHtml = `
      <table style="width: 100%; border-collapse: collapse;">
        <tbody>
          ${
            Object.entries(entry).map(([key, value]) => {
              let displayKey = key === "codigo_expediente_administrativo_DGA" ? "expediente_DGA" : key;
              return `
                <tr>
                  <td style="font-weight: bold; text-align: left; padding: 4px; vertical-align: top;">${displayKey}</td>
                  <td style="text-align: left; padding: 4px; vertical-align: top;">${value}</td>
                </tr>
              `;
            }).join('')
          }
        </tbody>
      </table>
    `;
    document.getElementById('info-container').innerHTML = infoHtml;
  } else {
    document.getElementById('info-container').innerText = 'Información no encontrada';
  }
}

</script>
</body>
</html>
